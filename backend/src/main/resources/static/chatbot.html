<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI助手</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; overflow:hidden; background:#f5f6f8; }
    </style>
</head>
<body>
    <script src="https://o.alicdn.com/appflow/chatbot/v1/AppflowChatSDK.js"></script>
    <script>
        var ps = new URLSearchParams(window.location.search);
        APPFLOW_CHAT_SDK.init({
            integrateConfig: {
                integrateId: ps.get('integrateId') || '',
                domain: { requestDomain: ps.get('requestDomain') || '' }
            }
        });
    </script>
</body>
</html>
